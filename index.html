<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly</title>
    
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid d-flex align-items-center justify-content-between">
            
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <img src="https://cdn.prod.website-files.com/61707b4f874fa22b7482b07e/6985523b75ff0c43835ad959_Wordly%20Icon.png" width="30" alt="logo">
                <span class="fw-bold">Wordly</span>
            </a>

            <h5 class="mb-0">Mini dictionary!</h5>

        </div>
    </nav>

    <!-- Search -->
    <div class="search-container">
        <form class="search-box" action="#" method="GET">
            <input type="text" name="query" placeholder="Search..." required>
            <button type="submit">Search</button>
        </form>
    </div>

    <div class="result-container text-center mt-4">
    <h2 id="word-title"></h2>
    <p id="definition"></p>
    </div>
















    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="script.js" defer></script>

</body>
</html>
